<!DOCTYPE html>
<html>
<head>
<title>The Padlewski Family</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Georgia, "Times New Roman", serif;
    background: #222;
    color: #fff;
    margin: 0;
    min-height: 100vh;

    display: flex;
    align-items: center;
    justify-content: center;
}

.container {
    text-align: center;
    padding: 20px;
}

h1 {
    margin: 18px 0;
    font-size: 28px;
    letter-spacing: 0.5px;
}

a {
    color: #ffffff;
    text-decoration: none;
    transition: opacity 0.2s ease, transform 0.2s ease;
    display: inline-block;
}

a:hover {
    opacity: 0.7;
    transform: scale(1.05);
}

/* Mobile adjustments */
@media (max-width: 600px) {
    h1 {
        font-size: 22px;
        margin: 14px 0;
    }
}
</style>

</head>
