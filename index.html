<!DOCTYPE html>
<html>
<head>
<title>The Padlewski Family</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Georgia, "Times New Roman", serif;
    background: #222;
    color: #fff;
    margin: 0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* Title */
.title {
    margin-top: 40px;
    font-size: 34px;
    text-align: center;
}

/* Grid */
.grid {
    display: grid;
    grid-template-columns: repeat(3, 180px);
    gap: 20px;
    margin-top: 40px;
    padding: 20px;
    justify-content: center;
}

/* Cards */
.card {
    background: #333;
    padding: 25px 15px;
    text-align: center;
    border-radius: 10px;
}

.card a {
    color: #fff;
    text-decoration: none;
    font-size: 20px;
}

/* Mobile */
@media (max-width: 600px) {
    .grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
    }

    .title {
        font-size: 26px;
    }

    .card {
        padding: 20px 10px;
    }

    .card a {
        font-size: 18px;
    }
}
</style>

</head>

<body>

<div class="title">Padlewski Family</div>

<div class="grid">

    <div class="card"><a href="https://padlewsk.github.io/padlewski-site/sylvie">Sylvie</a></div>
    <div class="card"><a href="https://padlewsk.github.io/padlewski-site/stephan">Stephan</a></div>
    <div class="card"><a href="https://padlewsk.github.io/padlewski-site/guillaume">Guillaume</a></div>
    <div class="card"><a href="https://padlewsk.github.io/padlewski-site/mathieu">Mathieu</a></div>
    <div class="card"><a href="https://padlewsk.github.io/padlewski-site/alice">Alice</a></div>

</div>

</body>
</html>
